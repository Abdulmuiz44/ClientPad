<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ClientPad API</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 48rem;
        padding: 3rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }
      p {
        margin: 0 0 0.75rem;
        line-height: 1.6;
        color: #334155;
      }
      code {
        background: #e2e8f0;
        padding: 0.15rem 0.4rem;
        border-radius: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ClientPad API</h1>
      <p>This host serves the Cloud control plane and public API routes for ClientPad.</p>
      <p><code>/api/cloud/v1</code> and <code>/api/public/v1</code> are available once the function deploy is active.</p>
    </main>
  </body>
</html>
